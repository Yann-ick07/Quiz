{% extends "base.html" %}
{% block title %}– Login{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <div class="card">
    <h2>🔑 Login</h2>
    <form method="POST">
      <div class="form-group"><label>Benutzername</label><input class="form-control" name="username" required autofocus></div>
      <div class="form-group"><label>Passwort</label><input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-primary" style="width:100%">Einloggen</button>
    </form>
    <p style="margin-top:1rem;text-align:center;color:var(--muted);font-size:0.9rem">
      Noch kein Account? <a href="/register" style="color:var(--accent2)">Registrieren</a>
    </p>
  </div>
</div>
{% endblock %}
