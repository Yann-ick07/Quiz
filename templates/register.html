{% extends "base.html" %}
{% block title %}– Registrieren{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <div class="card">
    <h2>🎮 Account erstellen</h2>
    <form method="POST">
      <div class="form-group"><label>Benutzername (min. 3 Zeichen)</label><input class="form-control" name="username" required autofocus></div>
      <div class="form-group"><label>Passwort (min. 4 Zeichen)</label><input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-primary" style="width:100%">Account erstellen</button>
    </form>
    <p style="margin-top:1rem;text-align:center;color:var(--muted);font-size:0.9rem">
      Bereits registriert? <a href="/login" style="color:var(--accent2)">Einloggen</a>
    </p>
  </div>
</div>
{% endblock %}
