{% extends "base.html" %}
{% block title %}– Multiplayer{% endblock %}
{% block content %}
<h1>👥 Multiplayer</h1>
<p style="color:var(--muted);margin-bottom:1.5rem">Spiele gegen einen Freund auf demselben Gerät</p>
<div class="card">
  <form method="POST" action="/multiplayer/start">
    <div class="form-group"><label>Spieler 2 Name</label><input class="form-control" name="player2" placeholder="Name eingeben" required></div>
    <div class="form-group">
      <label>Kategorie</label>
      <select class="form-control" name="category">
        <option value="random">🎲 Zufällig</option>
        {% for cat in categories %}<option>{{ cat }}</option>{% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Spiel starten</button>
  </form>
</div>
{% endblock %}
